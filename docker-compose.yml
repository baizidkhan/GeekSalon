services:
  client:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
      - npm_cache_client:/root/.npm
    command: sh -c "npm ci --prefer-offline && npm run dev:docker"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      INTERNAL_API_BASE_URL: http://host.docker.internal:4000
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "800"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  client_node_modules:
  client_next:
  npm_cache_client:
